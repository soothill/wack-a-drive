<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#08131c" />
    <meta
      name="description"
      content="Wack a Drive: a fast touch-friendly arcade game about unruly hard drives."
    />
    <title>Wack a Drive</title>
  </head>
  <body>
    <main id="game-shell" aria-label="Wack a Drive game">
      <div id="game-root"></div>
      <div id="rotate-prompt" role="status">
        <strong>ROTATE TO PLAY</strong>
        <span>This drive rack works best in portrait.</span>
      </div>
      <p id="game-status" class="sr-only" aria-live="polite"></p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
